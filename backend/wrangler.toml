# Festra API worker - SCAFFOLD ONLY, NOT DEPLOYED.
# Every route except GET /api/health answers 501 "coming_soon" until cutover
# (FABLE-ULTRAPLAN P2: GitHub Pages -> Cloudflare Pages + Workers). The UI
# team ships "coming soon" copy; nothing in app/ talks to this worker yet.

name = "festra-api"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# ---------------------------------------------------------------------------
# Bindings (typed in src/env.ts - keep the two in sync)
# ---------------------------------------------------------------------------

[[d1_databases]]
binding = "DB"
database_name = "festra"
# enable at cutover: paste the real id printed by `wrangler d1 create festra`
database_id = "00000000-0000-0000-0000-000000000000"

[[kv_namespaces]]
binding = "SESSIONS"
# enable at cutover: paste the real id printed by
# `wrangler kv namespace create SESSIONS`
id = "0000000000000000000000000000000000"

# enable at cutover: `wrangler r2 bucket create festra-reports`, then uncomment
# (and make Env.REPORTS non-optional in src/env.ts).
# [[r2_buckets]]
# binding = "REPORTS"
# bucket_name = "festra-reports"

# ---------------------------------------------------------------------------
# Secrets - declared here so they are discoverable, but NEVER given values in
# this file (and never under [vars]). Set them at cutover with:
#   wrangler secret put STRIPE_SECRET_KEY       # Stripe live API key
#   wrangler secret put STRIPE_WEBHOOK_SECRET   # signing secret for /api/webhooks/stripe
# Until set, Env.STRIPE_SECRET_KEY / Env.STRIPE_WEBHOOK_SECRET are undefined.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Routes / deploy - enable at cutover. Deliberately inert so an accidental
# `wrangler deploy` cannot put this worker in front of real traffic.
# ---------------------------------------------------------------------------
# workers_dev = false
# routes = [
#   { pattern = "festra.au/api/*", zone_name = "festra.au" },
#   { pattern = "festra.com.au/api/*", zone_name = "festra.com.au" }
# ]

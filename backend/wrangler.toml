# Festra API worker - CODE-COMPLETE, NOT DEPLOYED.
# Route logic is implemented in src/routes/*, and the festra.au/api/* route is
# staged for cutover. Do not run wrangler deploy until the founder gate clears.

name = "festra-api"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Top-level deploy config - MUST stay above any [table] header (TOML scoping;
# placing these after [vars] silently turns them into vars and wrangler
# ignores them - that exact bug blocked the first deploy attempt).
workers_dev = false
routes = [
  { pattern = "festra.au/api/*", zone_name = "festra.au" }
]

# ---------------------------------------------------------------------------
# Bindings (typed in src/env.ts - keep the two in sync)
# ---------------------------------------------------------------------------

[[d1_databases]]
binding = "DB"
database_name = "festra"
database_id = "91419ba0-16cf-4bf3-80e4-a6619aeefa37"

[[kv_namespaces]]
binding = "SESSIONS"
id = "decb878869c44caf8a3f27d81d3c6f24"

[[r2_buckets]]
binding = "REPORTS"
bucket_name = "festra-reports"

# ---------------------------------------------------------------------------
# Secrets - declared here so they are discoverable, but NEVER given values in
# this file (and never under [vars]). Set them at cutover with:
#   wrangler secret put STRIPE_SECRET_KEY       # Stripe live API key
#   wrangler secret put STRIPE_WEBHOOK_SECRET   # signing secret for /api/webhooks/stripe
#   wrangler secret put RESEND_API_KEY          # magic-link email (Resend provider)
# Until set, the matching routes answer 503 service_unavailable.
#
# Optional plain vars (safe under [vars] at cutover if needed):
#   EMAIL_PROVIDER = "console" | "resend"   # dev stub vs real sends (src/lib/email.ts)
#   EMAIL_FROM     = "Festra <auth@festra.au>"
# ---------------------------------------------------------------------------

[vars]
ENVIRONMENT = "production"

name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Quality gates THEN build. Nothing is published unless typecheck, lint, unit
  # tests and the data-source manifest all pass first (previously deploy ran
  # `npm run build` only, with no gates).
  verify-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck (tsc --noEmit)
        run: node node_modules/typescript/bin/tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Unit tests (vitest)
        run: npm run test
      - name: Verify data-source manifest
        run: npm run data:verify -- --no-network
      - name: Build static export (custom domain, root path)
        env:
          # Served from https://festra.au (GitHub Pages custom domain, cutover
          # 2026-06-12) - root-relative assets, no sub-path prefix. The old
          # github.io/melbourne-liveability URLs 301 to the custom domain.
          NEXT_PUBLIC_SITE_URL: https://festra.au
          # Public-by-design NEXT_PUBLIC values - set them as repository
          # Variables (Settings -> Secrets and variables -> Actions -> Variables),
          # not secrets. While unset they stay empty, which keeps current
          # behaviour: no analytics script, mailto feedback fallback.
          NEXT_PUBLIC_ANALYTICS_DOMAIN: ${{ vars.NEXT_PUBLIC_ANALYTICS_DOMAIN }}
          NEXT_PUBLIC_FORMSPREE_FEEDBACK_ID: ${{ vars.NEXT_PUBLIC_FORMSPREE_FEEDBACK_ID }}
          NEXT_PUBLIC_FEEDBACK_EMAIL: ${{ vars.NEXT_PUBLIC_FEEDBACK_EMAIL }}
        run: npm run build
      - name: Disable Jekyll (serve _next/* verbatim)
        run: touch out/.nojekyll
      # Smoke-test the BUILT artifact at the root path (festra.au serves from
      # the domain root) before it is uploaded, so an asset/link regression
      # fails CI instead of shipping.
      - name: Install Playwright browser (static smoke)
        run: npx playwright install --with-deps chromium
      - name: Serve artifact at the root path
        run: |
          npx --yes serve@14 out -l 4173 &
          curl -fsS --retry 30 --retry-delay 2 --retry-connrefused \
            http://localhost:4173/ > /dev/null
      - name: Static-artifact e2e (Playwright)
        env:
          STATIC_E2E: "1"
        run: npx playwright test
      - uses: actions/upload-pages-artifact@v5
        with:
          path: out

  # End-to-end smoke tests (Playwright runs against `next dev`). A separate job so
  # it runs in parallel with the build; deploy waits on it too.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: E2E smoke tests
        run: npm run test:e2e

  deploy:
    needs: [verify-build, e2e]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
  # The pre-publish e2e proves the ARTIFACT; this proves the LIVE EDGE -
  # cache propagation, chunk integrity and data fetches as real users see them.
  verify-live:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Wait for Pages propagation
        run: |
          for i in $(seq 1 20); do
            marker=$(curl -fsSL "https://festra.au/" | grep -c Festra || true)
            [ "$marker" -gt 0 ] && exit 0
            sleep 15
          done
          echo "site did not propagate in 5 minutes" && exit 1
      - name: E2E against the live site
        env:
          STATIC_E2E: "1"
          E2E_BASE_URL: https://festra.au
        run: npx playwright test --project=chromium


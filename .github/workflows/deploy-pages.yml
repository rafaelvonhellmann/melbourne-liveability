name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Quality gates THEN build. Nothing is published unless typecheck, lint, unit
  # tests and the data-source manifest all pass first (previously deploy ran
  # `npm run build` only, with no gates).
  verify-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck (tsc --noEmit)
        run: node node_modules/typescript/bin/tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Unit tests (vitest)
        run: npm run test
      - name: Verify data-source manifest
        run: npm run data:verify -- --no-network
      - name: Build static export (sub-path aware)
        env:
          # Project site is served from https://<user>.github.io/melbourne-liveability/
          # so runtime asset URLs (/data/*.json) must be prefixed with the repo name.
          NEXT_PUBLIC_BASE_PATH: /melbourne-liveability
          # Public-by-design NEXT_PUBLIC values - set them as repository
          # Variables (Settings -> Secrets and variables -> Actions -> Variables),
          # not secrets. While unset they stay empty, which keeps current
          # behaviour: no analytics script, mailto feedback fallback.
          NEXT_PUBLIC_ANALYTICS_DOMAIN: ${{ vars.NEXT_PUBLIC_ANALYTICS_DOMAIN }}
          NEXT_PUBLIC_FORMSPREE_FEEDBACK_ID: ${{ vars.NEXT_PUBLIC_FORMSPREE_FEEDBACK_ID }}
          NEXT_PUBLIC_FEEDBACK_EMAIL: ${{ vars.NEXT_PUBLIC_FEEDBACK_EMAIL }}
        run: npm run build
      - name: Disable Jekyll (serve _next/* verbatim)
        run: touch out/.nojekyll
      # Smoke-test the BUILT artifact under the GitHub Pages sub-path before it
      # is uploaded, so a basePath regression (assets, data fetches, links)
      # fails CI instead of shipping. Nesting out/ inside _site/ reproduces the
      # /melbourne-liveability/ prefix; naive `serve out` would 404 every URL.
      - name: Install Playwright browser (static smoke)
        run: npx playwright install --with-deps chromium
      - name: Serve artifact under the sub-path
        run: |
          mkdir _site
          cp -r out _site/melbourne-liveability
          npx --yes serve@14 _site -l 4173 &
          curl -fsS --retry 30 --retry-delay 2 --retry-connrefused \
            http://localhost:4173/melbourne-liveability/ > /dev/null
      - name: Static-artifact e2e (Playwright)
        env:
          STATIC_E2E: "1"
        run: npx playwright test
      - uses: actions/upload-pages-artifact@v5
        with:
          path: out

  # End-to-end smoke tests (Playwright runs against `next dev`). A separate job so
  # it runs in parallel with the build; deploy waits on it too.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: E2E smoke tests
        run: npm run test:e2e

  deploy:
    needs: [verify-build, e2e]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

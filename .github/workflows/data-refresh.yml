name: Data refresh

# Automatically re-fetch upstream open data, rebuild the scored artifacts, and
# commit them. Pushes made with GITHUB_TOKEN do NOT fire other workflows'
# on:push triggers, so after a successful push this workflow dispatches
# deploy-pages.yml explicitly - otherwise the refreshed data never redeploys.
#
# Cadence: 2nd of each month (covers quarterly crime + annual ABS editions;
# census-cadence sources simply no-op when upstream is unchanged because the
# sha256 manifest stays identical and git sees no diff).

on:
  schedule:
    - cron: "0 17 2 * *" # 02:00 AEST on the 2nd (cron is UTC)
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write # failure notification opens an issue
  actions: write # dispatch deploy-pages.yml after the auto-commit

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Report upstream freshness
        run: npm run data:freshness || true

      - name: Fetch base upstream data
        run: npm run data:fetch

      # These extra raw layers are inputs to the SAME build (normalize reads
      # vic-ho.geojson for heritage; build-poi reads the community/EV/police/
      # childcare extracts). They are NOT part of scripts/fetch.ts, so without
      # this step a clean-env refresh silently drops those layers (see the
      # 2026-06 regression). Keep this list in sync with the fetch scripts
      # AND with DATA-PIPELINE-AUDIT.md (apply step -> fetch -> workflow map).
      - name: Fetch heritage + POI + proxy layers
        run: |
          npm run data:heritage
          npm run data:overlays
          npm run data:sea-level
          npm run data:fire-history
          # data:vif removed 2026-06-10: VIF2023 is a static release and
          # planning.vic WAF now 403s CI runners even via the curl shim.
          # The raw XLSX is committed at data/raw/vif2023-sa2.xlsx; re-fetch
          # manually when VIF2026 ships.
          npm run data:abs-approvals
          npm run data:abs-qualifications
          npm run data:schools
          npm run data:water-corp
          EPA_API_KEY=${{ secrets.EPA_API_KEY }} npm run data:epa-air
          npm run data:community-poi
          npm run data:ev-poi
          npm run data:aged-care
          npm run data:vic-facilities
          npm run data:noise
          npm run data:nuisance
          npm run data:stations
          # ANNUAL layers (data:school-zones, data:traffic, data:activity-centres)
          # are deliberately NOT here: they write committed public/data files that
          # persist across rebuilds, and re-fetching them monthly is wasteful.
          # Refresh yearly by running the script + committing when an edition ships.
          # (data:epa-air IS monthly above - its band snapshot is worth refreshing,
          # and it self-skips when the EPA_API_KEY secret is absent.)

      - name: Rebuild scored + derived artifacts
        run: npm run data:build

      # Refuse to commit an artifact that silently lost a field: fails when any
      # populated-field count in places.json drops >2% vs git HEAD or a field
      # disappears entirely. See DATA-PIPELINE-AUDIT.md.
      - name: Coverage gate (no silent field loss)
        run: npx tsx scripts/verify-coverage-diff.ts

      - name: Test
        run: npm test

      - name: Verify data sources + citations
        run: npm run data:verify

      - name: Build static site
        run: npm run build

      - name: Commit refreshed data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/generated/*.json public/data/*
          if git diff --staged --quiet; then
            echo "No data changes - upstream unchanged."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): automated refresh $(date -u +%Y-%m-%d)"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # GITHUB_TOKEN pushes do not fire on:push workflows, so kick the Pages
      # deploy explicitly (deploy-pages.yml has workflow_dispatch).
      - name: Trigger Pages redeploy
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref master

      - name: Open or update the failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body="The scheduled data refresh failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} - if the coverage gate tripped, an upstream fetch likely broke silently (see DATA-PIPELINE-AUDIT.md)."
          gh label create data-refresh --description "Automated data refresh failures" --color D93F0B || true
          existing=$(gh issue list --label data-refresh --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create \
              --title "Data refresh failed ($(date -u +%Y-%m-%d))" \
              --label data-refresh \
              --body "$body"
          fi
